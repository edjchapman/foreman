# Dependabot keeps the locked Python deps and the SHA-pinned GitHub Actions fresh.
# Commit prefixes follow Conventional Commits so the generated PR titles pass
# commit-style.yml (build(deps): … / ci(deps): …). PRs target main, so ci.yml +
# check.yml + audit.yml run on them like any other branch.
version: 2
updates:
  # Python dependencies (reads uv.lock + pyproject [dependency-groups]).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      python:
        patterns: ["*"]
    commit-message:
      prefix: "build"
      include: "scope"

  # GitHub Actions — bumps the SHA pins (and keeps the trailing # vX comment in sync).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci"
      include: "scope"
