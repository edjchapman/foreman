name: scorecard

# OpenSSF Scorecard — scores the repo's supply-chain / security posture (branch
# protection, pinned actions, dependency-update tooling, code scanning, SAST, …),
# publishes the result (powers the README badge), and uploads findings to the
# Security tab.

on:
  branch_protection_rule:
  schedule:
    - cron: "0 9 * * 1" # weekly, Mondays 09:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: scorecard
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to code scanning
      id-token: write # publish_results via OIDC (powers the badge)
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
