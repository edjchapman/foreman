name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint + test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Codecov OIDC (tokenless upload)

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: foreman
          POSTGRES_PASSWORD: foreman
          POSTGRES_DB: foreman
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U foreman"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://foreman:foreman@localhost:5432/foreman
      DJANGO_SECRET_KEY: ci-secret

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync
      - name: Apply migrations (validates against Postgres)
        run: uv run python manage.py migrate
      - name: Lint + test
        run: make ci
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: ./coverage.xml
          use_oidc: true
          fail_ci_if_error: false # flip to true once the Codecov app is authorized + green

  terraform:
    name: terraform validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
      - name: fmt + validate the platform module
        run: make tf-check
