name: release-please

# Automated releases from Conventional Commits. release-please maintains a Release PR
# (CHANGELOG + version bump); merging it cuts a GitHub Release + tag, which then triggers
# a versioned image publish to GHCR.
#
# Token: a Release PR opened by the default GITHUB_TOKEN does NOT trigger other workflows,
# so under the main ruleset its required checks never report. RELEASE_PLEASE_TOKEN (a
# fine-grained PAT) makes the PR trigger CI normally; without it the action still runs but
# the PR must be re-triggered manually (close+reopen) to merge.

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .github/release-please-manifest.json

  publish-image:
    name: publish-image
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # keyless Sigstore signing of the provenance attestation
      attestations: write # record the SLSA build provenance
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ghcr.io/edjchapman/foreman
          tags: |
            type=raw,value=${{ needs.release-please.outputs.version }}
            type=raw,value=latest
      - id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-name: ghcr.io/edjchapman/foreman
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  # Railway doesn't watch GHCR, so CD is explicit: pin each service to the new
  # semver tag and trigger a deployment (web first — its pre-deploy migrate and
  # /readyz healthcheck gate worker/beat). Logic lives in scripts/railway-deploy.sh
  # per the "CI calls make targets" convention. See docs/deploy.md.
  deploy:
    name: deploy
    needs: [release-please, publish-image]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: railway-deploy # shared with deploy.yml — release + manual deploys never interleave
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_ENVIRONMENT_ID: ${{ vars.RAILWAY_ENVIRONMENT_ID }}
          RAILWAY_WEB_SERVICE_ID: ${{ vars.RAILWAY_WEB_SERVICE_ID }}
          RAILWAY_WORKER_SERVICE_ID: ${{ vars.RAILWAY_WORKER_SERVICE_ID }}
          RAILWAY_BEAT_SERVICE_ID: ${{ vars.RAILWAY_BEAT_SERVICE_ID }}
        run: make deploy VERSION=${{ needs.release-please.outputs.version }}
