name: dependency-review

# Gates the dependency *diff* of a PR — blocks newly-introduced vulnerable or
# license-incompatible packages before they land. Complements the scheduled,
# whole-tree pip-audit (audit.yml), which catches CVEs disclosed after merge.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dependency-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: on-failure
