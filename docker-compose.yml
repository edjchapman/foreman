services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: foreman
      POSTGRES_PASSWORD: foreman
      POSTGRES_DB: foreman
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foreman"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: sh -c "uv run python manage.py migrate && uv run python manage.py runserver 0.0.0.0:8000"
    environment:
      DATABASE_URL: postgres://foreman:foreman@db:5432/foreman
      DJANGO_DEBUG: "true"
      DJANGO_SECRET_KEY: dev-insecure
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/app

volumes:
  pgdata:
